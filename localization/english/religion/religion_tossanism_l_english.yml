  select_personal_deity_caelic_decision_tt:0 "You will choose a personal patron deity, gaining a unique blessing based on your devotion."

  select_personal_deity_caelic_decision.select_caelus:0 "Devote yourself to Caelus, God of the Skies and Power"
  select_personal_deity_caelic_decision.select_attinstainz:0 "Devote yourself to Attinstáinz, God of the Earth and the Forge"
  select_personal_deity_caelic_decision.select_muhitan:0 "Devote yourself to Muhitan, Goddess of the Seas and Trade"
