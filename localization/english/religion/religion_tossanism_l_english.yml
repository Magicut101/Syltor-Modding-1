 pheonixtossanist_adherent_plural:0 "Phoenixians"
 pheonixtossanist_desc:0 "A polytheistic pantheon following a modified pantheon faith that has seen blending with Twin Dragon, creating a hybridized faith. This faith follows five major deities and several minor deities, each are tied to a region of Ryzan and an element."

