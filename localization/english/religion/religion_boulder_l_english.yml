 new_boulder_adherent_plural:0 "New Rockers"
 new_boulder_desc:0 "Seemingly identical to the Orthodox Boulderian faith, the differences come in the core tenets that comprise each Pillar. They believe the golems themselves to be gods in of themselves along with the Boulder, rather then its messengers, and seek to make the faith more polytheistic - for the Boulder is just another god among another pantheon."